name: Build and Deploy to Netlify

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build site
      run: npm run build
      
    - name: Copy blog files to dist
      run: |
        mkdir -p dist/blog
        cp -r public/blog/* dist/blog/
        echo "✓ Blog files copied to dist/blog/"
        ls -la dist/blog/
        
    - name: Deploy to Netlify
      uses: nwtgck/actions-netlify@v3.0
      with:
        publish-dir: './dist'
        production-deploy: true
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Deployed from GitHub Actions"
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: b19e778c-7ca8-469c-aa90-afdb0b05996e
        
    - name: Deployment Summary
      run: |
        echo "✅ Deployment complete!"
        echo "🌐 Site: https://cooldrivepro.netlify.app"
        echo "📚 Blog: https://cooldrivepro.netlify.app/blog/"
